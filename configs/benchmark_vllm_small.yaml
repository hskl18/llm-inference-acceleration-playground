run:
  name: vllm-small-sweep
  output_dir: results/runs/vllm-small-sweep
  hardware_label: gpu-vllm-host
  warmup_requests: 4
  measured_requests: 16
  timeout_seconds: 120

endpoint:
  base_url: http://localhost:8000/v1
  api_key_env: OPENAI_API_KEY
  backend: vllm
  api_kind: chat

model:
  name: meta-llama/Llama-3.2-1B-Instruct
  dtype: fp16
  quantization: none

workload:
  mode: synthetic
  input_tokens: [128, 512]
  output_tokens: [64, 128]
  concurrency: [1, 4, 8]
  seed: 42

report:
  formats: [markdown, json]
  plots: true
